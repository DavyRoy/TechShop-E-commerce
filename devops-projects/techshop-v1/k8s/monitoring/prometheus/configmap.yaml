apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring

data:

  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/prometheus.rules.yml

    scrape_configs:

      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: kubernetes-nodes
        kubernetes_sd_configs:
          - role: node

      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod

  prometheus.rules.yml: |
    groups:
      - name: example-alerts

        rules:
          - alert: HighCPUUsage
            expr: process_cpu_seconds_total > 0.8
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage detected"

  prometheus.service.yml: |
    groups:
      - name: service-alerts

        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service is down"