apiVersion: apps/v1
kind: Deployment 
metadata:
  name: techshop-micro-deployment-user
  namespace: techshop-micro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: techshop-micro-user
  template:
    metadata:
      labels:
        app: techshop-micro-user
    spec:
      containers:
      - name: techshop-micro-user
        image: services-user-service:latest
        imagePullPolicy: Never
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        ports:
        - containerPort: 5020
        env:
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: techshop-micro-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: techshop-micro-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          value: techshop_user
        - name: POSTGRES_HOST
          value: postgres-user
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: techshop-micro-config
              key: POSTGRES_PORT
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: techshop-micro-secret
              key: JWT_SECRET_KEY
        readinessProbe:
          httpGet:
            path: /health
            port: 5020
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 3
          successThreshold: 1
        livenessProbe:
          httpGet:
            path: /health
            port: 5020
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 3
          successThreshold: 1
        