apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zookeeper
  namespace: techshop-micro-service
spec:
  serviceName: zookeeper-svc
  replicas: 3
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
      - name: zookeeper
        image: confluentinc/cp-zookeeper:7.5.0
        ports:
          - containerPort: 2181
          - containerPort: 2888
          - containerPort: 3888
        env:
          - name: ZOOKEEPER_CLIENT_PORT
            value: "2181"
          - name: ZOOKEEPER_TICK_TIME
            value: "2000"
        volumeMounts:
          - name: data
            mountPath: /var/lib/zookeeper/data
      initContainers:
      - name: init-myid
        image: busybox
        command:
          - sh
          - -c
          - |
            echo "$(( ${HOSTNAME##*-} + 1 ))" > /var/lib/zookeeper/data/myid
        volumeMounts:
          - name: data
            mountPath: /var/lib/zookeeper/data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi