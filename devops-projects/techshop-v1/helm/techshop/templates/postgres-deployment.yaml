apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres-techshop
          image: {{ .Values.postgres.image }}:{{ .Values.postgres.tag }}
          ports:
            - containerPort: 5432
          
          # Переменные из Secret
          data:
            POSTGRES_USER: {{ .Values.postgres.user }}
            POSTGRES_PASSWORD: {{ .Values.postgres.password }}
            POSTGRES_DB: {{ .Values.postgres.db }}
          
          # Ресурсы
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          
          # Liveness probe — перезапустить если завис
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          
          # Readiness probe — убрать из балансировки если не готов
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          
          # Подключение volume
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      
      # Объявление volume
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc    # имя нашего PVC